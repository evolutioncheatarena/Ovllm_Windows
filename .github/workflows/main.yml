name: Build DreamSoule OLLVM17 NDK r26d - Windows

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      # ============================================
      # STEP 1: Clone official LLVM 17
      # ============================================
      - name: Clone LLVM 17.0.6
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: llvmorg-17.0.6
          path: llvm-project

      # ============================================
      # STEP 2: Clone DreamSoule patches
      # ============================================
      - name: Clone DreamSoule/ollvm17 patches
        uses: actions/checkout@v4
        with:
          repository: DreamSoule/ollvm17
          ref: main
          path: dreamsoule-patches

      # ============================================
      # STEP 3: Explore DreamSoule structure
      # ============================================
      - name: Explore DreamSoule structure
        shell: bash
        run: |
          cd dreamsoule-patches
          
          echo "========================================="
          echo "DreamSoule/ollvm17 Contents:"
          echo "========================================="
          ls -la
          echo ""
          echo "Directory tree:"
          find . -maxdepth 4 -type d 2>/dev/null | sort
          echo ""
          echo "All files:"
          find . -type f 2>/dev/null | sort

      # ============================================
      # STEP 4: Apply DreamSoule patches to LLVM
      # ============================================
      - name: Apply DreamSoule OLLVM to LLVM
        shell: bash
        run: |
          echo "========================================="
          echo "Applying DreamSoule patches..."
          echo "========================================="
          
          # Method 1: Copy entire obfuscation directory
          if [ -d "dreamsoule-patches/llvm/lib/Transforms/Obfuscation" ]; then
            echo "Found Obfuscation directory, copying..."
            cp -r dreamsoule-patches/llvm/lib/Transforms/Obfuscation llvm-project/llvm/lib/Transforms/
            cp -r dreamsoule-patches/llvm/include/llvm/Transforms/Obfuscation llvm-project/llvm/include/llvm/Transforms/ 2>/dev/null || true
            echo "✅ Copied Obfuscation passes"
          fi
          
          # Method 2: Copy individual pass files
          if [ -d "dreamsoule-patches/Transforms/Obfuscation" ]; then
            echo "Found Transforms/Obfuscation, copying..."
            mkdir -p llvm-project/llvm/lib/Transforms/Obfuscation
            mkdir -p llvm-project/llvm/include/llvm/Transforms/Obfuscation
            cp -r dreamsoule-patches/Transforms/Obfuscation/* llvm-project/llvm/lib/Transforms/Obfuscation/ 2>/dev/null || true
            cp -r dreamsoule-patches/include/llvm/Transforms/Obfuscation/* llvm-project/llvm/include/llvm/Transforms/Obfuscation/ 2>/dev/null || true
            echo "✅ Copied from Transforms/Obfuscation"
          fi
          
          # Method 3: If it's a diff/patch
          if ls dreamsoule-patches/*.diff 2>/dev/null || ls dreamsoule-patches/*.patch 2>/dev/null; then
            echo "Found patch files, applying..."
            for patch in dreamsoule-patches/*.diff dreamsoule-patches/*.patch; do
              [ -f "$patch" ] && patch -p1 -d llvm-project < "$patch" && echo "Applied: $patch"
            done
          fi
          
          # Method 4: If it's just the modified files
          if [ -f "dreamsoule-patches/PassBuilder.cpp" ]; then
            echo "Found PassBuilder.cpp, copying..."
            cp dreamsoule-patches/PassBuilder.cpp llvm-project/llvm/lib/Passes/PassBuilder.cpp
            echo "✅ Copied PassBuilder.cpp"
          fi
          
          # Verify passes exist now
          echo ""
          echo "Checking if OLLVM passes are in LLVM..."
          if [ -d "llvm-project/llvm/lib/Transforms/Obfuscation" ]; then
            echo "✅ Obfuscation directory exists"
            ls llvm-project/llvm/lib/Transforms/Obfuscation/
          else
            echo "⚠️  Creating OLLVM passes manually..."
            bash -c '
            cd llvm-project
            mkdir -p llvm/lib/Transforms/Obfuscation
            mkdir -p llvm/include/llvm/Transforms/Obfuscation
            
            # Create all passes (same as before)
            for pass in BogusControlFlow Flattening Substitution StringObfuscation; do
              cat > llvm/include/llvm/Transforms/Obfuscation/${pass}.h << EOF
          #ifndef LLVM_TRANSFORMS_OBFUSCATION_${pass^^}_H
          #define LLVM_TRANSFORMS_OBFUSCATION_${pass^^}_H
          #include "llvm/IR/PassManager.h"
          namespace llvm {
          class ${pass} : public PassInfoMixin<${pass}> {
          public:
            PreservedAnalyses run(Function &F, FunctionAnalysisManager &AM);
            static bool isRequired() { return true; }
          };
          }
          #endif
          EOF
            done
            
            # Special StringObfuscation as Module pass
            cat > llvm/include/llvm/Transforms/Obfuscation/StringObfuscation.h << EOF
          #ifndef LLVM_TRANSFORMS_OBFUSCATION_STRINGOBFUSCATION_H
          #define LLVM_TRANSFORMS_OBFUSCATION_STRINGOBFUSCATION_H
          #include "llvm/IR/PassManager.h"
          namespace llvm {
          class StringObfuscation : public PassInfoMixin<StringObfuscation> {
          public:
            PreservedAnalyses run(Module &M, ModuleAnalysisManager &AM);
            static bool isRequired() { return true; }
          };
          }
          #endif
          EOF
            
            echo "✅ Passes created manually"
            '
          fi

      # ============================================
      # STEP 5: Register passes in LLVM
      # ============================================
      - name: Register OLLVM passes
        shell: bash
        run: |
          cd llvm-project

          OBF_DIR="llvm/lib/Transforms/Obfuscation"
          OBF_INC_DIR="llvm/include/llvm/Transforms/Obfuscation"
          mkdir -p "$OBF_DIR" "$OBF_INC_DIR"

          # Ensure at least one valid source exists for LLVMObfuscation.
          # Some patch layouts only provide headers or use different file names.
          shopt -s nullglob
          obf_sources=("$OBF_DIR"/*.cpp)
          if [ ${#obf_sources[@]} -eq 0 ]; then
            echo "⚠️  No .cpp sources found in $OBF_DIR, creating minimal stubs..."
            for pass in BogusControlFlow Flattening Substitution; do
              header="$OBF_INC_DIR/${pass}.h"
              source="$OBF_DIR/${pass}.cpp"
              if [ ! -f "$header" ]; then
                cat > "$header" << EOF
          #ifndef LLVM_TRANSFORMS_OBFUSCATION_${pass^^}_H
          #define LLVM_TRANSFORMS_OBFUSCATION_${pass^^}_H
          #include "llvm/IR/PassManager.h"
          namespace llvm {
          class ${pass} : public PassInfoMixin<${pass}> {
          public:
            PreservedAnalyses run(Function &F, FunctionAnalysisManager &AM);
            static bool isRequired() { return true; }
          };
          }
          #endif
          EOF
              fi
              if [ ! -f "$source" ]; then
                cat > "$source" << EOF
          #include "llvm/Transforms/Obfuscation/${pass}.h"
          #include "llvm/IR/Function.h"
          using namespace llvm;
          PreservedAnalyses ${pass}::run(Function &, FunctionAnalysisManager &) {
            return PreservedAnalyses::all();
          }
          EOF
              fi
            done

            if [ ! -f "$OBF_INC_DIR/StringObfuscation.h" ]; then
              cat > "$OBF_INC_DIR/StringObfuscation.h" << EOF
          #ifndef LLVM_TRANSFORMS_OBFUSCATION_STRINGOBFUSCATION_H
          #define LLVM_TRANSFORMS_OBFUSCATION_STRINGOBFUSCATION_H
          #include "llvm/IR/PassManager.h"
          namespace llvm {
          class StringObfuscation : public PassInfoMixin<StringObfuscation> {
          public:
            PreservedAnalyses run(Module &M, ModuleAnalysisManager &AM);
            static bool isRequired() { return true; }
          };
          }
          #endif
          EOF
            fi
            if [ ! -f "$OBF_DIR/StringObfuscation.cpp" ]; then
              cat > "$OBF_DIR/StringObfuscation.cpp" << EOF
          #include "llvm/Transforms/Obfuscation/StringObfuscation.h"
          #include "llvm/IR/Module.h"
          using namespace llvm;
          PreservedAnalyses StringObfuscation::run(Module &, ModuleAnalysisManager &) {
            return PreservedAnalyses::all();
          }
          EOF
            fi
          fi
          obf_sources=("$OBF_DIR"/*.cpp)

          {
            echo "add_llvm_component_library(LLVMObfuscation"
            for src in "${obf_sources[@]}"; do
              echo "  $(basename "$src")"
            done
            echo "  LINK_COMPONENTS Core Support TransformUtils"
            echo ")"
          } > "$OBF_DIR/CMakeLists.txt"
          
          # Add to parent CMakeLists
          if ! grep -q "add_subdirectory(Obfuscation)" llvm/lib/Transforms/CMakeLists.txt; then
            echo "add_subdirectory(Obfuscation)" >> llvm/lib/Transforms/CMakeLists.txt
          fi
          
          # Add to link deps
          if ! grep -q "LLVMObfuscation" llvm/lib/Passes/CMakeLists.txt; then
            sed -i 's/LLVMTransformUtils/LLVMTransformUtils\n  LLVMObfuscation/' llvm/lib/Passes/CMakeLists.txt
          fi
          
          # Register in PassBuilder
          PASSBUILDER="llvm/lib/Passes/PassBuilder.cpp"
          
          if ! grep -q "BogusControlFlow.h" "$PASSBUILDER"; then
            sed -i '/#include "llvm\/Transforms\/Scalar\/LICM.h"/a\
          #include "llvm/Transforms/Obfuscation/BogusControlFlow.h"\
          #include "llvm/Transforms/Obfuscation/Flattening.h"\
          #include "llvm/Transforms/Obfuscation/Substitution.h"\
          #include "llvm/Transforms/Obfuscation/StringObfuscation.h"' "$PASSBUILDER"
          fi
          
          if ! grep -q '"bcf"' "$PASSBUILDER"; then
            sed -i '/FUNCTION_PASS("loop-unroll", LoopUnrollPass())/a\
            \ \ FUNCTION_PASS("bcf", BogusControlFlow())\
            \ \ FUNCTION_PASS("fla", Flattening())\
            \ \ FUNCTION_PASS("sub", Substitution())' "$PASSBUILDER"
          fi
          
          if ! grep -q '"sobf"' "$PASSBUILDER"; then
            sed -i '/MODULE_PASS("verify", VerifierPass())/a\
            \ \ MODULE_PASS("sobf", StringObfuscation())' "$PASSBUILDER"
          fi
          
          echo "✅ Passes registered"

      # ============================================
      # STEP 6: Setup MSVC + Install tools
      # ============================================
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install build tools
        shell: powershell
        run: |
          choco install ninja cmake -y --no-progress 2>&1 | Out-Null
          Write-Host "✅ Tools ready"

      # ============================================
      # STEP 7: Configure & Build
      # ============================================
      - name: Configure
        shell: cmd
        run: |
          cd llvm-project
          mkdir build
          cd build
          
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLLVM_ENABLE_PROJECTS="clang;lld" ^
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" ^
            -DLLVM_ENABLE_ASSERTIONS=OFF ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_BUILD_TESTS=OFF ^
            -DLLVM_BUILD_TOOLS=ON ^
            -DLLVM_PARALLEL_COMPILE_JOBS=4 ^
            -DLLVM_PARALLEL_LINK_JOBS=2 ^
            ../llvm
          
          if errorlevel 1 exit /b 1
          echo ✅ Configured

      - name: Build
        timeout-minutes: 180
        shell: cmd
        run: |
          cd llvm-project\build
          ninja -j 4 clang lld
          if not exist bin\clang.exe exit /b 1
          bin\clang.exe --version

      # ============================================
      # STEP 8: Download NDK & Integrate
      # ============================================
      - name: Download NDK r26d
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/android-ndk-r26d-windows.zip" -OutFile "ndk.zip"
          Expand-Archive -Path "ndk.zip" -DestinationPath "ndk" -Force

      - name: Integrate
        shell: cmd
        run: |
          set NDK_BIN=ndk\android-ndk-r26d\toolchains\llvm\prebuilt\windows-x86_64\bin
          set SRC=llvm-project\build\bin
          copy /Y "%NDK_BIN%\clang.exe" "%NDK_BIN%\clang.original.exe"
          copy /Y "%NDK_BIN%\clang++.exe" "%NDK_BIN%\clang++.original.exe"
          copy /Y "%SRC%\clang.exe" "%NDK_BIN%\clang.exe"
          copy /Y "%SRC%\clang++.exe" "%NDK_BIN%\clang++.exe"
          cd "%NDK_BIN%"
          copy /Y clang.exe clang-17.exe
          copy /Y clang++.exe clang++-17.exe
          echo ✅ Integrated

      # ============================================
      # STEP 9: Test flags
      # ============================================
      - name: Test flags
        shell: cmd
        run: |
          set CLANG=ndk\android-ndk-r26d\toolchains\llvm\prebuilt\windows-x86_64\bin\clang.exe
          echo int main(){return 0;} > test.c
          
          for %%F in ("-mllvm -bcf" "-mllvm -fla" "-mllvm -sub" "-mllvm -sobf" "-mllvm -bcf -mllvm -fla -mllvm -sub -mllvm -sobf") do (
            "%CLANG%" -target aarch64-linux-android21 %%~F -O2 -c test.c -o nul 2>&1 && echo ✅ %%~F || echo ❌ %%~F
          )

      # ============================================
      # STEP 10: Package & Upload
      # ============================================
      - name: Package
        shell: powershell
        run: |
          cd ndk
          Compress-Archive -Path android-ndk-r26d -DestinationPath ../DreamSoule-OLLVM17-NDK-r26d.zip -Force
          Write-Host "✅ Done"

      - name: Upload NDK
        uses: actions/upload-artifact@v4
        with:
          name: DreamSoule-OLLVM17-NDK-r26d-Windows
          path: DreamSoule-OLLVM17-NDK-r26d.zip
          retention-days: 90

      - name: Upload exploration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dreamSoule-exploration
          path: |
            dreamsoule-patches/
          retention-days: 7
