name: Build DreamSoule OLLVM17 NDK r26d - Windows

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      # ============================================
      # STEP 1: Clone DreamSoule/ollvm17
      # ============================================
      - name: Clone DreamSoule/ollvm17
        uses: actions/checkout@v4
        with:
          repository: DreamSoule/ollvm17
          ref: main
          path: ollvm-source

      # ============================================
      # STEP 2: Explore DreamSoule structure
      # ============================================
      - name: Explore DreamSoule repository structure
        shell: bash
        run: |
          cd ollvm-source
          
          echo "========================================="
          echo "DreamSoule/ollvm17 Repository Structure"
          echo "========================================="
          
          echo "Top-level directories:"
          ls -d */ 2>/dev/null || echo "(root files only)"
          
          echo ""
          echo "Looking for LLVM source..."
          find . -maxdepth 3 -name "CMakeLists.txt" -path "*/llvm/*" 2>/dev/null | head -10
          
          echo ""
          echo "Looking for Obfuscation directory..."
          find . -type d -name "Obfuscation" 2>/dev/null
          
          echo ""
          echo "Looking for OLLVM pass files..."
          find . -name "BogusControlFlow*" -o -name "Flattening*" -o -name "Substitution*" -o -name "StringObfuscation*" 2>/dev/null
          
          echo ""
          echo "Looking for PassBuilder.cpp..."
          find . -name "PassBuilder.cpp" 2>/dev/null
          
          echo ""
          echo "Full directory tree (3 levels):"
          find . -maxdepth 3 -type d 2>/dev/null | sort

      # ============================================
      # STEP 3: Setup MSVC
      # ============================================
      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # ============================================
      # STEP 4: Install build tools
      # ============================================
      - name: Install Ninja & CMake
        shell: powershell
        run: |
          choco install ninja cmake -y --no-progress 2>&1 | Out-Null
          ninja --version
          cmake --version
          Write-Host "✅ Build tools ready"

      # ============================================
      # STEP 5: Build from whatever structure exists
      # ============================================
      - name: Find LLVM root and build
        shell: bash
        run: |
          cd ollvm-source
          
          # Find the LLVM root directory
          LLVM_ROOT=$(find . -maxdepth 2 -name "CMakeLists.txt" -path "*/llvm/*" -exec dirname {} \; | head -1)
          
          if [ -z "$LLVM_ROOT" ]; then
            # Maybe the repo itself is the LLVM root
            if [ -f "llvm/CMakeLists.txt" ]; then
              LLVM_ROOT="llvm"
            elif [ -f "CMakeLists.txt" ]; then
              LLVM_ROOT="."
            else
              echo "Could not find LLVM root!"
              find . -name "CMakeLists.txt" -maxdepth 3
              exit 1
            fi
          fi
          
          echo "LLVM root found at: $LLVM_ROOT"
          echo "LLVM_ROOT=$LLVM_ROOT" >> $GITHUB_ENV
          
          # Check if Obfuscation passes exist
          OBFUSCATION_DIR=$(find . -type d -name "Obfuscation" | head -1)
          if [ -n "$OBFUSCATION_DIR" ]; then
            echo "✅ Obfuscation directory: $OBFUSCATION_DIR"
            echo "Passes found:"
            ls "$OBFUSCATION_DIR"/*.cpp 2>/dev/null || echo "  (no .cpp files)"
          else
            echo "⚠️  No Obfuscation directory found"
            echo "Checking if passes are already in PassBuilder..."
            grep -r "BogusControlFlow\|bcf\|ollvm" "$LLVM_ROOT" --include="*.cpp" --include="*.h" -l | head -10
          fi

      # ============================================
      # STEP 6: Configure
      # ============================================
      - name: Configure OLLVM
        shell: cmd
        run: |
          cd ollvm-source
          mkdir build
          cd build
          
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLLVM_ENABLE_PROJECTS="clang;lld" ^
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" ^
            -DLLVM_ENABLE_ASSERTIONS=OFF ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_BUILD_TESTS=OFF ^
            -DLLVM_BUILD_EXAMPLES=OFF ^
            -DLLVM_BUILD_TOOLS=ON ^
            -DLLVM_PARALLEL_COMPILE_JOBS=4 ^
            -DLLVM_PARALLEL_LINK_JOBS=2 ^
            ../llvm 2>&1 | tee cmake_log.txt
            
          if errorlevel 1 (
            echo ❌ CMake failed!
            echo Trying alternative paths...
            
            :: Try from root if llvm/ doesn't work
            cd ..
            rmdir /s /q build
            mkdir build
            cd build
            
            cmake -G Ninja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DLLVM_ENABLE_PROJECTS="clang;lld" ^
              -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" ^
              -DLLVM_ENABLE_ASSERTIONS=OFF ^
              -DLLVM_INCLUDE_TESTS=OFF ^
              -DLLVM_BUILD_TESTS=OFF ^
              -DLLVM_BUILD_TOOLS=ON ^
              -DLLVM_PARALLEL_COMPILE_JOBS=4 ^
              -DLLVM_PARALLEL_LINK_JOBS=2 ^
              .. 2>&1 | tee cmake_log2.txt
              
            if errorlevel 1 (
              echo ❌ Both attempts failed!
              type cmake_log.txt
              type cmake_log2.txt
              exit /b 1
            )
          )
          echo ✅ Configured

      # ============================================
      # STEP 7: Build
      # ============================================
      - name: Build OLLVM
        timeout-minutes: 180
        shell: cmd
        run: |
          cd ollvm-source\build
          
          echo =========================================
          echo Building DreamSoule OLLVM17...
          echo Started: %date% %time%
          echo =========================================
          
          ninja -j 4 clang lld
          
          if not exist bin\clang.exe (
            echo ❌ Build failed - clang.exe not found
            echo Contents of build directory:
            dir
            exit /b 1
          )
          
          echo ✅ Built successfully!
          bin\clang.exe --version 2>&1 | findstr /i "clang"

      # ============================================
      # STEP 8: Test available flags
      # ============================================
      - name: Test DreamSoule flags
        shell: cmd
        run: |
          set CLANG=ollvm-source\build\bin\clang.exe
          
          echo int main(){return 0;} > test.c
          
          echo =========================================
          echo Testing ALL possible OLLVM flags...
          echo =========================================
          
          :: List of all known OLLVM flag names
          for %%F in (
            "-mllvm -bcf"
            "-mllvm -bcf_loop=3"
            "-mllvm -bcf_prob=90"
            "-mllvm -fla"
            "-mllvm -sub"
            "-mllvm -sub_loop=5"
            "-mllvm -split"
            "-mllvm -split_num=10"
            "-mllvm -sobf"
            "-mllvm -str-obf"
            "-mllvm -flattening"
            "-mllvm -boguscf"
            "-mllvm -substitution"
            "-mllvm -splitbasicblock"
            "-mllvm -strcryp"
            "-mllvm -obf"
            "-mllvm -ollvm"
          ) do (
            "%CLANG%" -target aarch64-linux-android21 %%~F -O2 -c test.c -o nul 2>&1
            if not errorlevel 1 (
              echo ✅ %%~F
            )
          )
          
          echo =========================================
          echo Testing complete!
          echo =========================================

      # ============================================
      # STEP 9: Download NDK & Integrate
      # ============================================
      - name: Download NDK r26d
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/android-ndk-r26d-windows.zip" -OutFile "ndk.zip"
          Expand-Archive -Path "ndk.zip" -DestinationPath "ndk" -Force

      - name: Integrate into NDK
        shell: cmd
        run: |
          set NDK_BIN=ndk\android-ndk-r26d\toolchains\llvm\prebuilt\windows-x86_64\bin
          set OLLVM_BIN=ollvm-source\build\bin
          
          copy /Y "%NDK_BIN%\clang.exe" "%NDK_BIN%\clang.original.exe"
          copy /Y "%NDK_BIN%\clang++.exe" "%NDK_BIN%\clang++.original.exe"
          copy /Y "%OLLVM_BIN%\clang.exe" "%NDK_BIN%\clang.exe"
          copy /Y "%OLLVM_BIN%\clang++.exe" "%NDK_BIN%\clang++.exe"
          
          cd "%NDK_BIN%"
          copy /Y clang.exe clang-17.exe
          copy /Y clang++.exe clang++-17.exe
          
          echo ✅ Integrated!

      # ============================================
      # STEP 10: Package
      # ============================================
      - name: Package
        shell: powershell
        run: |
          cd ndk
          Compress-Archive -Path android-ndk-r26d -DestinationPath ../DreamSoule-OLLVM17-NDK.zip -Force
          Write-Host "✅ Packaged"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DreamSoule-OLLVM17-NDK
          path: DreamSoule-OLLVM17-NDK.zip
          retention-days: 90

      - name: Upload exploration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-structure-info
          path: |
            ollvm-source/build/cmake_log*.txt
          retention-days: 7
